services:
  postgres:
    ports:
      - "5432:5432"

  # ─── Redis — expose port for local Redis clients
  redis:
    ports:
      - "6379:6379"

  # ─── Backend — uvicorn hot reload on every .py save
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      # Always rebuild when compose up --build is run
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vertifarm}:${POSTGRES_PASSWORD:-vertifarm_secret_2024}@postgres:5432/${POSTGRES_DB:-vertifarm}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_2024}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_not_for_production}
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost"
      FIRST_SUPERUSER_EMAIL: ${FIRST_SUPERUSER_EMAIL:-admin@vertifarm.io}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD:-Admin@123456}
    entrypoint: ["bash", "/app/entrypoint.dev.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Frontend — Vite HMR on every .tsx/.ts/.css save
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - /app/node_modules
    environment:
      BACKEND_URL: "http://backend:8000"
      BACKEND_WS_URL: "ws://backend:8000"
      VITE_API_URL: "http://localhost:8000"
      VITE_WS_URL: "ws://localhost:8000"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

  # ─── Nginx — disabled in dev, only starts with --profile production
  nginx:
    profiles:
      - production
